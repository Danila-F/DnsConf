name: Retry Failed Cron Task
on:
  workflow_run:
    workflows: ["DNS Block&Redirect Configurer cron task"] # Имя основного workflow
    types: [completed]

permissions:
  actions: write
  contents: read

jobs:
  on-failure:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.run_attempt < 3 }}
    steps:
      - name: Rerun failed workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh run rerun ${{ github.event.workflow_run.id }} --failed
